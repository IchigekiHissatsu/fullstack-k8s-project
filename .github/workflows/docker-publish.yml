name: Build and Push Images

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Alapnév a registry-hez
  REPO_NAME: ichigekihissatsu/fullstack-k8s-project

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # BACKEND (API) BUILD
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/MyBackendAPI
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_NAME }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.REPO_NAME }}-backend:${{ github.sha }}

      # INVENTORY SERVICE BUILD
      - name: Build and push Inventory image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/InventoryService
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_NAME }}-inventory:latest
            ${{ env.REGISTRY }}/${{ env.REPO_NAME }}-inventory:${{ github.sha }}

      # FRONTEND BUILD
      # JAVÍTÁS: A context elérési útja kisbetűsre módosítva a mappaszerkezeted alapján
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/my-angular-frontend
          file: ./frontend/my-angular-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_NAME }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.REPO_NAME }}-frontend:${{ github.sha }}