apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: my-app-space
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      containers:
      - name: inventory-container
        image: my-inventory-service:v5
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: MONGODB_URI
          value: "mongodb://dbuser:dbpassword@mongodb:27017/myappdb"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: my-app-space
spec:
  selector:
    app: inventory
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80