apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: my-app-space
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: heartd0wn/fullstack-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: MONGO_URI
          value: "mongodb://dbuser:dbpassword@mongodb.my-app-space.svc.cluster.local:27017/myappdb"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: my-app-space
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP