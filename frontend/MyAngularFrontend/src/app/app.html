<div class="min-h-screen bg-gray-100 p-8">
  <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg p-6">
    <h1 class="text-3xl font-bold text-blue-600 mb-6 border-b pb-2">Könyvtár Kezelő - GitOps Aktív!</h1>

    <div class="mb-8 p-4 bg-blue-50 rounded-lg border border-blue-100">
      <h2 class="text-lg font-semibold text-blue-800 mb-3">Új könyv felvétele</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <input type="text" placeholder="Cím" class="p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
        <input type="text" placeholder="Szerző" class="p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
        <input type="number" placeholder="Év" class="p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
      </div>
      <button class="mt-4 px-6 py-2 bg-green-600 text-white font-bold rounded hover:bg-green-700 transition shadow-md">
        Mentés a felhőbe
      </button>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-200 text-gray-700">
            <th class="p-3 border">Cím</th>
            <th class="p-3 border">Szerző</th>
            <th class="p-3 border">Év</th>
          </tr>
        </thead>
        <tbody>
          @for (book of pagedBooks; track book.id) {
            <tr class="hover:bg-gray-50 transition">
              <td class="p-3 border text-gray-800">{{ book.title }}</td>
              <td class="p-3 border text-gray-800">{{ book.author }}</td>
              <td class="p-3 border text-gray-800">{{ book.year }}</td>
            </tr>
          } @empty {
            <tr>
              <td colspan="3" class="p-8 text-center text-gray-500 italic">
                Nincsenek könyvek a rendzerben, vagy a backend nem elérhető.
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <div class="mt-6 flex justify-between items-center">
      <button 
        (click)="prevPage()" 
        [disabled]="currentPage === 1" 
        class="px-4 py-2 bg-blue-500 text-white rounded shadow hover:bg-blue-600 disabled:bg-gray-300 disabled:cursor-not-allowed transition"
      >
        Előző
      </button>
      
      <span class="font-semibold text-gray-700">Oldal: {{currentPage}}</span>
      
      <button 
        (click)="nextPage()" 
        [disabled]="(currentPage * pageSize) >= books.length"
        class="px-4 py-2 bg-blue-500 text-white rounded shadow hover:bg-blue-600 disabled:bg-gray-300 disabled:cursor-not-allowed transition"
      >
        Következő
      </button>
    </div>
  </div>
</div>
